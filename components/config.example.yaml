# Open-source Gateway runtime config example
#
# Copy this file to `components/config.yaml` for local overrides.
# `components/config.yaml` is ignored by git on purpose.

# Which gateway implementation `make gateway` should start:
# - claude: Python gateway + Claude Code SDK
# - codex: Node gateway + Codex SDK
# - gemini: Node gateway + Gemini CLI core
gateway_mode: claude

# Codex-only knob. Ignored by Python gateway.
codex_reasoning_effort: high

listener_channels:
  weixin:
    enabled: false
    command:
      - make
      - -C
      - components/servers/weixin_listener
      - start-gateway
    env:
      AGENTS_WORKSPACE: "."
      OPENCLAW_STATE_DIR: "./data/weixin_state"
